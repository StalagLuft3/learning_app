
services:
  backend:
    build: ./Backend
    env_file:
      - ./Backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - db
    command: >
      sh -c "npx prisma migrate deploy && node server.js"
  frontend:
    build: ./frontEnd
    ports:
      - "80:80"
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
